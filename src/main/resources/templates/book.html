<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Seats - Cine Book</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav class="navbar">
        <a href="/" class="navbar-brand">Cine Book</a>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/theaters">Theaters</a>
            <a th:href="@{/admin}">Admin Dashboard</a>
        </div>
    </nav>

    <div class="container">
        <div class="booking-container">
            <div class="screen-container">
                <h2 style="margin-bottom: 0.5rem;">Select Seats for <span th:text="${showtime.movie.title}" style="color:var(--primary-color)"></span></h2>
                <p style="margin-bottom: 2rem; color: var(--text-muted);" th:text="${showtime.hall.theater.name + ' - ' + showtime.hall.name + ' | ' + #temporals.format(showtime.showDate, 'dd MMM') + ' @ ' + showtime.showTime}"></p>
                
                <div class="screen"></div>
                <div class="seats-grid" id="seatsGrid">
                    <!-- Seats generated by JS -->
                </div>
            </div>

            <form class="booking-form" th:action="@{/book/confirm}" method="post" id="bookingForm">
                <h2>Checkout</h2>
                
                <input type="hidden" name="showtimeId" th:value="${showtime.id}">
                <input type="hidden" name="seats" id="seatsInput" value="">
                <input type="hidden" name="totalPrice" id="priceInput" value="0">

                <div class="form-group">
                    <label for="customerName">Full Name</label>
                    <input type="text" id="customerName" name="customerName" required placeholder="John Doe">
                </div>
                
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required placeholder="john@example.com">
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" name="phone" required placeholder="555-0199">
                </div>

                <div class="summary">
                    <p><span>Selected Seats:</span> <span id="seatsCount">0</span></p>
                    <p><span>Price per Seat:</span> <span th:text="${'$' + showtime.price}">$15.00</span></p>
                    <hr style="border-color: rgba(255,255,255,0.1); margin: 1rem 0;">
                    <p><span>Total:</span> <span class="total-price" id="totalPriceDisplay">$0.00</span></p>
                </div>

                <button type="submit" class="btn" style="margin-top: 1rem;" id="checkoutBtn" disabled>Confirm Booking</button>
            </form>
        </div>
    </div>

    <script th:inline="javascript">
        const grid = document.getElementById('seatsGrid');
        const seatsCount = document.getElementById('seatsCount');
        const totalPriceDisplay = document.getElementById('totalPriceDisplay');
        const seatsInput = document.getElementById('seatsInput');
        const priceInput = document.getElementById('priceInput');
        const checkoutBtn = document.getElementById('checkoutBtn');
        
        // Pass the dynamic price from Thymeleaf to Javascript
        const PRICE_PER_SEAT = /*[[${showtime.price}]]*/ 15.0;

        const rows = ['A', 'B', 'C', 'D', 'E', 'F'];
        const cols = 8;
        
        let selectedSeats = [];

        // Generate labeled seats
        for (let r = 0; r < rows.length; r++) {
            for (let c = 1; c <= cols; c++) {
                const seatLabel = rows[r] + c;
                const seat = document.createElement('div');
                seat.className = 'seat';
                seat.innerText = seatLabel; // Showing the label
                seat.style.color = "rgba(255,255,255,0.4)";
                
                // Randomly mark some as sold
                if (Math.random() < 0.3) {
                    seat.classList.add('sold');
                } else {
                    seat.addEventListener('click', () => {
                        seat.classList.toggle('selected');
                        
                        if (seat.classList.contains('selected')) {
                            selectedSeats.push(seatLabel);
                        } else {
                            selectedSeats = selectedSeats.filter(s => s !== seatLabel);
                        }
                        
                        updateSummary();
                    });
                }
                grid.appendChild(seat);
            }
        }

        function updateSummary() {
            const count = selectedSeats.length;
            const total = count * PRICE_PER_SEAT;

            seatsCount.innerText = count;
            totalPriceDisplay.innerText = `$${total.toFixed(2)}`;
            
            seatsInput.value = selectedSeats.join(', ');
            priceInput.value = total;

            checkoutBtn.disabled = count === 0;
        }
    </script>
</body>
</html>
