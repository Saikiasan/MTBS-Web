<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookings - Cine Book Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .admin-nav { display: flex; gap: 1rem; align-items: center; }
        .admin-nav a { color: var(--text-color); text-decoration: none; font-weight: 600; font-size: 0.95rem; }
        .admin-nav a:hover { color: var(--primary-color); }
        .admin-section { background: rgba(255, 255, 255, 0.05); padding: 2rem; border-radius: 12px; margin-bottom: 2rem; }
        .table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        .table th, .table td { padding: 1rem; text-align: left; border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        .table th { color: var(--primary-color); }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="/admin" class="navbar-brand">Cine Book Admin</a>
        <div class="admin-nav">
            <a href="/admin">Dashboard</a>
            <a href="/admin/bookings" style="color:var(--primary-color)">Bookings</a>
            <a href="/admin/movies">Movies</a>
            <a href="/admin/theaters">Theaters</a>
            <a href="/admin/showtimes">Showtimes</a>
            <a href="/" style="margin-left: 2rem; color: var(--primary-color);">View Site &rarr;</a>
        </div>
    </nav>

    <div class="container">
        <div class="admin-section">
            <h2 style="margin-bottom:1rem;">All Bookings</h2>
            <div style="margin-bottom:1rem;">
                <input type="text" placeholder="Search by Booking Ref..." style="padding:0.5rem; border-radius:6px; border:none; background:rgba(255,255,255,0.1); color:white; width:300px;">
            </div>
            <table class="table">
                <thead>
                    <tr>
                        <th>Ref</th>
                        <th>Customer</th>
                        <th>Movie</th>
                        <th>Theater</th>
                        <th>Seats</th>
                        <th>Total</th>
                        <th>Date</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="booking : ${bookings}">
                        <td th:text="${booking.bookingRef}">CINE-1234</td>
                        <td th:text="${booking.customerName}">John Doe</td>
                        <td th:text="${booking.movieTitle}">Inception</td>
                        <td th:text="${booking.theaterName}">PVR IMAX</td>
                        <td th:text="${booking.seats}">2</td>
                        <td th:text="${'$' + booking.totalPrice}">$30.00</td>
                        <td th:text="${#temporals.format(booking.bookingDate, 'dd MMM yyyy HH:mm')}">12 Oct 2026</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
