<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - MTBS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .admin-nav { display: flex; gap: 1rem; align-items: center; }
        .admin-nav a { color: var(--text-color); text-decoration: none; font-weight: 600; font-size: 0.95rem; }
        .admin-nav a:hover { color: var(--primary-color); }
        .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.5rem; margin-bottom: 2rem; }
        .kpi-card { background: rgba(255,255,255,0.05); padding: 1.5rem; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); }
        .kpi-title { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 0.5rem; }
        .kpi-value { font-size: 2rem; font-weight: 800; color: #fff; }
        .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; margin-bottom: 2rem; }
        .chart-container { background: rgba(255,255,255,0.02); padding: 1.5rem; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="/admin" class="navbar-brand">MTBS Admin</a>
        <div class="admin-nav">
            <a href="/admin">Dashboard</a>
            <a href="/admin/bookings">Bookings</a>
            <a href="/admin/movies">Movies</a>
            <a href="/admin/theaters">Theaters</a>
            <a href="/admin/showtimes">Showtimes</a>
            <a href="/" style="margin-left: 2rem; color: var(--primary-color);">View Site &rarr;</a>
        </div>
    </nav>

    <div class="container">
        <h2 style="margin-bottom: 1.5rem;">Analytics Dashboard</h2>
        
        <div class="kpi-grid">
            <div class="kpi-card">
                <div class="kpi-title">Total Revenue</div>
                <div class="kpi-value">$24,500</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-title">Total Bookings</div>
                <div class="kpi-value" th:text="${totalBookings}">150</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-title">Active Movies</div>
                <div class="kpi-value" th:text="${totalMovies}">45</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-title">Active Theaters</div>
                <div class="kpi-value" th:text="${totalTheaters}">5</div>
            </div>
        </div>

        <div class="charts-grid">
            <div class="chart-container">
                <h3 style="margin-bottom:1rem; font-size:1.1rem; color:var(--text-muted)">Revenue Over Last 7 Days</h3>
                <canvas id="revenueChart"></canvas>
            </div>
            <div class="chart-container">
                <h3 style="margin-bottom:1rem; font-size:1.1rem; color:var(--text-muted)">Bookings by Theater</h3>
                <canvas id="theaterChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        // Dummy data for charts
        new Chart(document.getElementById('revenueChart'), {
            type: 'line',
            data: {
                labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
                datasets: [{
                    label: 'Revenue ($)',
                    data: [1200, 1900, 1500, 2200, 3500, 4100, 3800],
                    borderColor: '#3b82f6',
                    tension: 0.4,
                    fill: true,
                    backgroundColor: 'rgba(59, 130, 246, 0.2)'
                }]
            },
            options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { grid: { color: 'rgba(255,255,255,0.05)' } }, x: { grid: { display: false } } } }
        });

        new Chart(document.getElementById('theaterChart'), {
            type: 'doughnut',
            data: {
                labels: ['PVR IMAX', 'INOX Lido', 'Cinépolis', 'AMC Premium', 'Regal'],
                datasets: [{
                    data: [35, 20, 25, 10, 10],
                    backgroundColor: ['#3b82f6', '#f43f5e', '#10b981', '#f59e0b', '#8b5cf6'],
                    borderWidth: 0
                }]
            },
            options: { responsive: true, cutout: '70%', plugins: { legend: { position: 'bottom', labels: { color: '#94a3b8' } } } }
        });
    </script>
</body>
</html>
