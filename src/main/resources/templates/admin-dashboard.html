<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - MTBS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .admin-section { background: rgba(255, 255, 255, 0.05); padding: 2rem; border-radius: 12px; margin-bottom: 2rem; }
        .table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        .table th, .table td { padding: 1rem; text-align: left; border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        .table th { color: var(--primary-color); }
        .action-btn { padding: 0.5rem 1rem; font-size: 0.8rem; border-radius: 6px; cursor: pointer; text-decoration: none; display: inline-block; }
        .btn-edit { background: #ffc107; color: #000; }
        .btn-delete { background: #dc3545; color: #fff; border: none; }
    </style>
</head>
<body>
    <nav class="navbar">
        <h1><a href="/" style="text-decoration:none; color:inherit;">MTBS Admin</a></h1>
        <div><a href="/" style="color:white; text-decoration:none;">View Site</a></div>
    </nav>

    <div class="container">
        <div th:if="${message}" class="alert-success" style="margin-bottom: 1rem;">
            <span th:text="${message}"></span>
        </div>

        <div class="admin-section">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h2>Manage Movies</h2>
                <a th:href="@{/admin/movies/new}" class="btn">Add New Movie</a>
            </div>
            
            <table class="table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Title</th>
                        <th>Rating</th>
                        <th>Description</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="movie : ${movies}">
                        <td th:text="${movie.id}">1</td>
                        <td th:text="${movie.title}">Movie Title</td>
                        <td th:text="${movie.rating}">8.5</td>
                        <td th:text="${#strings.abbreviate(movie.description, 50)}">Desc</td>
                        <td>
                            <a th:href="@{/admin/movies/edit/{id}(id=${movie.id})}" class="action-btn btn-edit">Edit</a>
                            <form th:action="@{/admin/movies/delete/{id}(id=${movie.id})}" method="post" style="display:inline;">
                                <button type="submit" class="action-btn btn-delete" onclick="return confirm('Are you sure?')">Delete</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="admin-section">
            <h2>Recent Bookings</h2>
            <table class="table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Customer</th>
                        <th>Movie</th>
                        <th>Seats</th>
                        <th>Total Price</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="booking : ${bookings}">
                        <td th:text="${booking.id}">1</td>
                        <td th:text="${booking.customerName}">John Doe</td>
                        <td th:text="${booking.movieTitle}">Inception</td>
                        <td th:text="${booking.seats}">2</td>
                        <td th:text="${'$' + booking.totalPrice}">$30.00</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
