<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Confirmation - MTBS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .receipt-card { background: #fff; color: #000; border-radius: 12px; padding: 3rem; max-width: 600px; margin: 0 auto; box-shadow: 0 20px 40px rgba(0,0,0,0.5); position: relative; }
        .receipt-card::before, .receipt-card::after { content: ""; position: absolute; width: 30px; height: 30px; background: var(--bg-color); border-radius: 50%; top: 50%; transform: translateY(-50%); }
        .receipt-card::before { left: -15px; }
        .receipt-card::after { right: -15px; }
        .dashed-line { border-top: 2px dashed #ccc; margin: 2rem 0; }
        .row { display: flex; justify-content: space-between; margin-bottom: 1rem; }
        .label { color: #666; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; }
        .value { font-size: 1.2rem; font-weight: 800; }
        .barcode { text-align: center; margin-top: 2rem; font-family: 'Courier New', Courier, monospace; font-size: 2rem; letter-spacing: 5px; }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="/" class="navbar-brand">MTBS Web</a>
    </nav>

    <div class="container">
        <div th:if="${booking != null}" class="receipt-card">
            <h2 style="text-align: center; margin-bottom: 2rem; color: var(--primary-color);">Booking Confirmed!</h2>
            
            <div class="row">
                <div>
                    <div class="label">Movie</div>
                    <div class="value" th:text="${booking.movieTitle}">Inception</div>
                </div>
                <div style="text-align: right;">
                    <div class="label">Booking Ref</div>
                    <div class="value" th:text="${booking.bookingRef}">MTBS-1234</div>
                </div>
            </div>
            
            <div class="row">
                <div>
                    <div class="label">Theater & Hall</div>
                    <div class="value" th:text="${booking.theaterName + ' - ' + booking.hallName}">PVR IMAX - Screen 1</div>
                </div>
            </div>

            <div class="row">
                <div>
                    <div class="label">Customer</div>
                    <div class="value" th:text="${booking.customerName}">John Doe</div>
                </div>
                <div style="text-align: right;">
                    <div class="label">Date</div>
                    <div class="value" th:text="${#temporals.format(booking.bookingDate, 'dd MMM yyyy')}">12 Oct 2026</div>
                </div>
            </div>

            <div class="dashed-line"></div>

            <div class="row">
                <div>
                    <div class="label">Seats</div>
                    <div class="value" th:text="${booking.seats}">2</div>
                </div>
                <div style="text-align: right;">
                    <div class="label">Total Paid</div>
                    <div class="value" style="color: #10b981;" th:text="${'$' + booking.totalPrice}">$30.00</div>
                </div>
            </div>

            <div class="barcode" th:text="${'*' + booking.bookingRef + '*'}">*MTBS-1234*</div>
            
            <div style="text-align: center; margin-top: 3rem;">
                <button class="btn" onclick="window.print()">Print Ticket</button>
                <a href="/" class="btn" style="background: #333; margin-left: 1rem;">Back to Home</a>
            </div>
        </div>
        
        <div th:if="${booking == null}" style="text-align: center;">
            <h2>No booking data found.</h2>
            <a href="/" class="btn" style="margin-top: 2rem;">Back to Home</a>
        </div>
    </div>
</body>
</html>
