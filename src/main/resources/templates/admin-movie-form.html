<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Movie Form</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .form-container { background: rgba(255, 255, 255, 0.05); padding: 2rem; border-radius: 12px; max-width: 600px; margin: 0 auto; }
        .form-group input { width: 100%; padding: 0.8rem; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); color: #fff; border-radius: 6px; }
    </style>
</head>
<body>
    <nav class="navbar">
        <h1><a href="/admin" style="text-decoration:none; color:inherit;">&larr; Admin Dashboard</a></h1>
    </nav>

    <div class="container">
        <div class="form-container">
            <h2 th:text="${movie.id == null ? 'Add New Movie' : 'Edit Movie'}" style="margin-bottom: 2rem;">Movie Form</h2>
            
            <form th:action="${movie.id == null ? '/admin/movies' : '/admin/movies/update/' + movie.id}" th:object="${movie}" method="post">
                
                <div class="form-group">
                    <label for="title">Title</label>
                    <input type="text" id="title" th:field="*{title}" required>
                </div>

                <div class="form-group">
                    <label for="rating">Rating (out of 10)</label>
                    <input type="number" id="rating" th:field="*{rating}" step="0.1" max="10" required>
                </div>

                <div class="form-group">
                    <label for="image">Poster Image URL</label>
                    <input type="text" id="image" th:field="*{image}" required>
                </div>

                <div class="form-group">
                    <label for="imdbUrl">IMDB URL</label>
                    <input type="text" id="imdbUrl" th:field="*{imdbUrl}">
                </div>

                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" th:field="*{description}" rows="4" style="width: 100%; padding: 0.8rem; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); color: #fff; border-radius: 6px;" required></textarea>
                </div>

                <button type="submit" class="btn" style="margin-top: 1rem; width: 100%;">Save Movie</button>
            </form>
        </div>
    </div>
</body>
</html>
